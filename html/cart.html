<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>电子书店 - 购物车</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/cart.css" />
  </head>

  <body>
    <div class="site-page">
      <!-- 统一导航栏：与项目其他页面一致 -->
      <header class="site-header">
        <div class="site-container">
          <nav class="site-nav" aria-label="主导航">
            <a class="site-brand" href="./books.html" aria-label="进入书籍列表">
              <img class="site-brand__logo" src="../图片/logo.jpg" alt="电子书店 Logo" />
              <span class="site-brand__name">电子书店</span>
            </a>

            <ul class="site-nav__list">
              <li><a class="site-nav__link" href="./books.html">书籍</a></li>
              <li>
                <a class="site-nav__link" href="./cart.html" aria-current="page">购物车</a>
              </li>
              <li><a class="site-nav__link" href="./orders.html">订单</a></li>
              <li><a class="site-nav__link" href="./me.html">我的</a></li>
              <li><a class="site-nav__link" href="./login.html">登录</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main class="site-main">
        <div class="site-container">
          <section class="cart" aria-label="购物车">
            <div class="site-card">
              <header class="cart__header">
                <div class="cart__heading">
                  <h1 class="cart__title">购物车</h1>
                  <p class="cart__subtitle">勾选商品后可进行结算。</p>
                </div>

                <!-- 顶部：全选 -->
                <div class="cart__toolbar" aria-label="操作栏">
                  <label class="cart__selectall" aria-label="全选">
                    <input class="cart__checkbox" type="checkbox" name="selectAll" />
                    <span class="cart__selectall-text">全选</span>
                  </label>
                </div>
              </header>

              <div class="site-divider cart__divider" role="separator" aria-hidden="true"></div>

              <!--
                购物车列表：
                每一行包含：书籍标题、作者、单价、删除按钮
              -->
              <div class="cart__list" aria-label="购物车列表">
                <article class="cart-row" aria-label="购物车条目：河的第三条岸">
                  <div class="cart-row__main">
                    <h2 class="cart-row__title">河的第三条岸</h2>
                    <p class="cart-row__author">作者：[巴西] 若昂·吉马良斯·罗萨</p>
                  </div>
                  <div class="cart-row__author-col" aria-label="作者">若昂·吉马良斯·罗萨</div>
                  <div class="cart-row__price" aria-label="单价">¥ 56.00</div>
                  <button class="cart-row__delete" type="button">删除</button>
                </article>

                <article class="cart-row" aria-label="购物车条目：人间蒸发">
                  <div class="cart-row__main">
                    <h2 class="cart-row__title">人间蒸发</h2>
                    <p class="cart-row__author">作者：[美] 劳拉·戴夫</p>
                  </div>
                  <div class="cart-row__author-col" aria-label="作者">劳拉·戴夫</div>
                  <div class="cart-row__price" aria-label="单价">¥ 49.80</div>
                  <button class="cart-row__delete" type="button">删除</button>
                </article>

                <article class="cart-row" aria-label="购物车条目：亲密有间：有边界感的伴侣更长久的关系">
                  <div class="cart-row__main">
                    <h2 class="cart-row__title">亲密有间：有边界感的伴侣更长久的关系</h2>
                    <p class="cart-row__author">作者：[美] 亨利·克劳德 / 约翰·汤森德</p>
                  </div>
                  <div class="cart-row__author-col" aria-label="作者">亨利·克劳德 / 约翰·汤森德</div>
                  <div class="cart-row__price" aria-label="单价">¥ 59.00</div>
                  <button class="cart-row__delete" type="button">删除</button>
                </article>
              </div>

              <!-- 底部：总计 + 结算（预留跳转入口到订单页） -->
              <footer class="cart__footer" aria-label="结算区">
                <div class="cart__total" aria-label="总计金额">
                  <span class="cart__total-label">总计</span>
                  <span class="cart__total-value">¥ 164.80</span>
                </div>

                <a class="cart__checkout" href="./orders.html" aria-label="去结算并跳转到订单页">
                  去结算
                </a>
              </footer>
            </div>
          </section>
        </div>
      </main>

      <footer class="site-footer">
        <div class="site-container">
          <p class="site-footer__text">© 2026 电子书店 · All rights reserved.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
