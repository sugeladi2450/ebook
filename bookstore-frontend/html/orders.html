<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>电子书店 - 订单</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/orders.css" />
  </head>

  <body>
    <div class="site-page">
      <!-- 统一导航栏：与项目其他页面一致 -->
      <header class="site-header">
        <div class="site-container">
          <nav class="site-nav" aria-label="主导航">
            <a class="site-brand" href="./books.html" aria-label="进入书籍列表">
              <img class="site-brand__logo" src="http://localhost:8080/images/logo.jpg" alt="电子书店 Logo" />
              <span class="site-brand__name">电子书店</span>
            </a>

            <ul class="site-nav__list">
              <li><a class="site-nav__link" href="./books.html">书籍</a></li>
              <li><a class="site-nav__link" href="./cart.html">购物车</a></li>
              <li>
                <a class="site-nav__link" href="./orders.html" aria-current="page">订单</a>
              </li>
              <li><a class="site-nav__link" href="./profile.html">我的</a></li>
              <li><a class="site-nav__link" href="./login.html">登录</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main class="site-main">
        <div class="site-container">
          <section class="orders" aria-label="订单列表">
            <div class="site-card">
              <header class="orders__header">
                <div class="orders__heading">
                  <h1 class="orders__title">订单</h1>
                  <p class="orders__subtitle">
                    查看你的订单记录与状态信息，可从购物车结算进入或通过导航栏直接访问。
                  </p>
                </div>
              </header>

              <div class="site-divider orders__divider" role="separator" aria-hidden="true"></div>

              <!--
                订单列表：
                每条包含：订单号、书籍名称、订单金额、订单状态（待支付/已完成）
              -->
              <div class="orders__list" aria-label="订单列表">
                <article class="order-row" aria-label="订单：待支付">
                  <div class="order-row__no">订单号：20260319-0001</div>
                  <div class="order-row__book">书籍：河的第三条岸</div>
                  <div class="order-row__amount">¥ 56.00</div>
                  <div class="order-row__status order-row__status--pending">待支付</div>
                </article>

                <article class="order-row" aria-label="订单：已完成">
                  <div class="order-row__no">订单号：20260318-0123</div>
                  <div class="order-row__book">书籍：人间蒸发</div>
                  <div class="order-row__amount">¥ 49.80</div>
                  <div class="order-row__status order-row__status--done">已完成</div>
                </article>

                <article class="order-row" aria-label="订单：已完成">
                  <div class="order-row__no">订单号：20260310-0456</div>
                  <div class="order-row__book">书籍：亲密有间：有边界感的伴侣更长久的关系</div>
                  <div class="order-row__amount">¥ 59.00</div>
                  <div class="order-row__status order-row__status--done">已完成</div>
                </article>
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer class="site-footer">
        <div class="site-container">
          <p class="site-footer__text">© 2026 电子书店 · All rights reserved.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
